; PTZ Patrol Manager — PHP configuration
; Location: /etc/php/8.2/fpm/conf.d/99-ptz.ini
; Applied by install.sh. Tune values here and reload PHP-FPM:
;   sudo systemctl reload php8.2-fpm

; ── Session security ──────────────────────────────────────────────────────────
; These mirror the settings in session.php but set at the ini level
; as a belt-and-braces measure for any edge case where session.php is bypassed.
session.use_strict_mode    = 1
session.use_only_cookies   = 1
session.cookie_httponly    = 1
session.cookie_samesite    = Strict
session.gc_maxlifetime     = 28800   ; 8 hours — matches auth_check.php TTL
session.sid_length         = 64
session.sid_bits_per_character = 6

; ── Upload / request limits ───────────────────────────────────────────────────
; PTZ Patrol Manager has no file upload feature, so keep these tight.
upload_max_filesize = 2M
post_max_size       = 8M
max_execution_time  = 30
max_input_time      = 30
memory_limit        = 64M

; ── Error handling ────────────────────────────────────────────────────────────
; Never expose errors to the browser in production.
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /var/log/php_ptz_errors.log

; ── Misc hardening ────────────────────────────────────────────────────────────
; Don't advertise PHP version in headers.
expose_php = Off

; Limit open_basedir to the web root and /etc/ptz/ only.
; This prevents PHP scripts from reading arbitrary files on the server.
open_basedir = /var/www/ptz:/etc/ptz:/tmp:/var/log

; Disable dangerous functions not needed by this application.
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,\
                    curl_multi_exec,parse_ini_file,show_source,phpinfo
